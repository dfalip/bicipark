<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bicipark — Bike parking maps</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🚲</text></svg>">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header id="header">
    <div id="brand">
      <h1>Bicipark</h1>
      <span id="citySubtitle">Bike parking maps by city</span>
    </div>

    <div id="topControls">
      <select id="citySelect"></select>

      <div id="searchBox">
        <input id="searchInput" type="text" placeholder="Busca una adreça o lloc..." />
        <button id="searchBtn">Buscar</button>
        <button id="nearBtn">A prop meu</button>
      </div>
    </div>
  </header>

  <section id="modeSwitch">
    <button class="mode-btn active" data-mode="parking">🚲 Aparcar</button>
    <button class="mode-btn" data-mode="road">🚴 Carretera</button>
    <button class="mode-btn" data-mode="mtb">⛰️ BTT</button>
  </section>
  
  <section id="filters">
    <button class="filter-btn active" data-filter="tots">Tots</button>
    <button class="filter-btn" data-filter="alta">🟢 Alta seguretat</button>
    <button class="filter-btn" data-filter="mitjana">🟡 Mitjana</button>
    <button class="filter-btn" data-filter="baixa">🔴 Baixa</button>
    <button id="bikeLaneBtn" class="bike-lane-btn">🚴 Carrils bici</button>
    <button class="filter-btn" data-filter="favorites">❤️ Favorits</button>
  </section>

  <section id="radiusFilters">
    <span>Àrea:</span>
    <button class="radius-btn active" data-radius="all">Tota la ciutat</button>
    <button class="radius-btn" data-radius="500">500 m</button>
    <button class="radius-btn" data-radius="1000">1 km</button>
    <button class="radius-btn" data-radius="2000">2 km</button>
  </section>

  <section id="statusBar">
    <div id="parkingCounter">Carregant aparcaments...</div>
    <div id="nearestInfo">Busca una ubicació o prem “A prop meu”.</div>
  </section>

  <div id="layout">
    <aside id="sidebar">
      <div id="sidebarHeader">
        <h2>Parkings</h2>
      </div>

      <div id="parkingList">
        <div class="emptySidebar">Carregant aparcaments...</div>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <div id="loadingOverlay">
    <div class="loader"></div>
    <p>Carregant dades...</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>

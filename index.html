<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bicipark — Aparcaments de bici a Barcelona</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🚲</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; }

    #header {
      background: #1a1a2e;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    #brand { display: flex; align-items: baseline; gap: 12px; }
    #header h1 { font-size: 22px; font-weight: 700; }
    #header span { font-size: 13px; opacity: 0.75; }

    #searchBox { display: flex; gap: 8px; align-items: center; }

    #searchInput {
      width: 280px;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    #searchBtn { background: #1D9E75; color: white; }
    #nearBtn { background: white; color: #1a1a2e; }

    #map { height: calc(100vh - 68px); width: 100%; }

    .pin {
      border: 3px solid white;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .pin-alta { background: #1D9E75; }
    .pin-mitjana { background: #F2C94C; }
    .pin-baixa { background: #EB5757; }

    .search-pin {
      background: #2F80ED;
      border: 3px solid white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }

    .legend {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend strong { display: block; margin-bottom: 4px; }

    .legend-dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .dot-alta { background: #1D9E75; }
    .dot-mitjana { background: #F2C94C; }
    .dot-baixa { background: #EB5757; }

    .security-label {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
    }

    .label-alta { background: #1D9E75; color: white; }
    .label-mitjana { background: #F2C94C; color: #1a1a2e; }
    .label-baixa { background: #EB5757; color: white; }

    @media (max-width: 700px) {
      #brand, #searchBox { width: 100%; }
      #searchInput { flex: 1; width: auto; }
      #map { height: calc(100vh - 112px); }
    }
  </style>
</head>

<body>
  <div id="header">
    <div id="brand">
      <h1>Bicipark</h1>
      <span>Aparcaments reals de bicicleta a Barcelona</span>
    </div>

    <div id="searchBox">
      <input id="searchInput" type="text" placeholder="Busca una adreça o lloc..." />
      <button id="searchBtn" onclick="searchLocation()">Buscar</button>
      <button id="nearBtn" onclick="locateUser()">A prop meu</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([41.3874, 2.1686], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB | Dades: Open Data BCN'
    }).addTo(map);

    const DATA_URL = "./aparcaments.json";

    let searchMarker;
    let userMarker;

    function getSecurityClass(seguretat) {
      if (seguretat === "alta") return "alta";
      if (seguretat === "baixa") return "baixa";
      return "mitjana";
    }

    function getSecurityText(seguretat) {
      if (seguretat === "alta") return "Alta";
      if (seguretat === "baixa") return "Baixa";
      return "Mitjana";
    }

    function createBikeIcon(seguretat) {
      const securityClass = getSecurityClass(seguretat);

      return L.divIcon({
        html: `<div class="pin pin-${securityClass}">🚲</div>`,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
    }

    const searchIcon = L.divIcon({
      html: '<div class="search-pin"></div>',
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    function extractItems(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.features)) return data.features;
      if (Array.isArray(data.result?.records)) return data.result.records;
      if (Array.isArray(data.records)) return data.records;
      if (Array.isArray(data.data)) return data.data;
      if (Array.isArray(data.items)) return data.items;

      // Si el JSON és un objecte amb molts registres dins
      const values = Object.values(data);
      const arrayValue = values.find(v => Array.isArray(v));
      if (arrayValue) return arrayValue;

      return [];
    }

    function normalizeNumber(value) {
      if (value === undefined || value === null) return null;

      const n = Number(String(value).replace(",", "."));
      return isNaN(n) ? null : n;
    }

    function isBarcelonaLatLng(lat, lng) {
      return lat >= 41.2 && lat <= 41.6 && lng >= 1.8 && lng <= 2.4;
    }

    function findCoordinatesDeep(obj) {
      const candidates = [];

      function scan(current) {
        if (!current || typeof current !== "object") return;

        // GeoJSON
        if (Array.isArray(current.coordinates) && current.coordinates.length >= 2) {
          const a = normalizeNumber(current.coordinates[0]);
          const b = normalizeNumber(current.coordinates[1]);

          if (a !== null && b !== null) {
            candidates.push({ lat: b, lng: a });
            candidates.push({ lat: a, lng: b });
          }
        }

        const keys = Object.keys(current);

        for (const latKey of keys) {
          const lk = latKey.toLowerCase();

          if (
            lk.includes("lat") ||
            lk.includes("latitude") ||
            lk.includes("geo_epgs_4326_lat") ||
            lk === "y"
          ) {
            for (const lngKey of keys) {
              const gok = lngKey.toLowerCase();

              if (
                gok.includes("lon") ||
                gok.includes("lng") ||
                gok.includes("long") ||
                gok.includes("longitude") ||
                gok.includes("geo_epgs_4326_lon") ||
                gok === "x"
              ) {
                const lat = normalizeNumber(current[latKey]);
                const lng = normalizeNumber(current[lngKey]);

                if (lat !== null && lng !== null) {
                  candidates.push({ lat, lng });
                  candidates.push({ lat: lng, lng: lat });
                }
              }
            }
          }
        }

        Object.values(current).forEach(scan);
      }

      scan(obj);

      return candidates.find(c => isBarcelonaLatLng(c.lat, c.lng)) || null;
    }

    function getCoordinates(rawItem) {
      const item = rawItem.properties || rawItem;

      const direct = findCoordinatesDeep(rawItem);
      if (direct) return direct;

      const address = item.addresses && item.addresses[0];
      const coords = address?.location?.coordinates;

      if (Array.isArray(coords) && coords.length >= 2) {
        const lat = normalizeNumber(coords[1]);
        const lng = normalizeNumber(coords[0]);

        if (isBarcelonaLatLng(lat, lng)) {
          return { lat, lng };
        }
      }

      return null;
    }

    function getName(rawItem) {
      const item = rawItem.properties || rawItem;
      return item.name || item.nom || item.title || item.equipment_name || item.NOM || item.Nom || "Aparcament de bicicleta";
    }

    function getAddress(rawItem) {
      const item = rawItem.properties || rawItem;
      const address = item.addresses && item.addresses[0];

      if (address) {
        const street = address.address_name || "";
        const number = address.address_start || "";
        const district = address.district_name || "";
        return `${street} ${number} ${district ? "— " + district : ""}`.trim();
      }

      return item.address || item.adreca || item.ADRECA || item.Adreca || "Adreça no disponible";
    }

    function getPlaces(rawItem) {
      const item = rawItem.properties || rawItem;

      const possibleFields = [
        item.capacity,
        item.capacitat,
        item.places,
        item.num_places,
        item.numero_places,
        item.total_places,
        item.CAPACITAT,
        item.Places
      ];

      for (const value of possibleFields) {
        if (value !== undefined && value !== null && value !== "") return value;
      }

      return "No indicades";
    }

    function estimateSecurity(rawItem) {
      const text = JSON.stringify(rawItem).toLowerCase();

      if (
        text.includes("bicipark") ||
        text.includes("cobert") ||
        text.includes("vigilat") ||
        text.includes("parking")
      ) {
        return "alta";
      }

      return "mitjana";
    }

    async function loadRealBikeParkings() {
      try {
        const response = await fetch(DATA_URL);

        if (!response.ok) {
          throw new Error("No s'ha trobat aparcaments.json");
        }

        const data = await response.json();
        const items = extractItems(data);

        console.log("Primer registre del JSON:", items[0]);

        let count = 0;

        items.forEach(rawItem => {
          const coords = getCoordinates(rawItem);

          if (!coords || isNaN(coords.lat) || isNaN(coords.lng)) return;

          const nom = getName(rawItem);
          const address = getAddress(rawItem);
          const places = getPlaces(rawItem);
          const seguretat = estimateSecurity(rawItem);
          const securityClass = getSecurityClass(seguretat);

          L.marker([coords.lat, coords.lng], { icon: createBikeIcon(seguretat) })
            .addTo(map)
            .bindPopup(`
              <strong>${nom}</strong><br>
              ${address}<br>
              Places: ${places}<br>
              Seguretat estimada:
              <span class="security-label label-${securityClass}">
                ${getSecurityText(seguretat)}
              </span>
              <br><br>
              <small>Dades: Open Data BCN</small>
              <br><br>
              <a href="https://www.google.com/maps/dir/?api=1&destination=${coords.lat},${coords.lng}" target="_blank">
                Com arribar
              </a>
            `);

          count++;
        });

        console.log("Aparcaments carregats:", count);

        if (count === 0) {
          alert("El fitxer s'ha carregat, però les coordenades tenen un format diferent. Obre F12 > Console i envia'm el 'Primer registre del JSON'.");
        }

      } catch (error) {
        console.error("Error carregant aparcaments:", error);
        alert("No s'han pogut carregar els aparcaments. Comprova que aparcaments.json existeix al repositori.");
      }
    }

    loadRealBikeParkings();

    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");

      div.innerHTML = `
        <strong>Seguretat estimada</strong>
        <div><span class="legend-dot dot-alta"></span>Alta</div>
        <div><span class="legend-dot dot-mitjana"></span>Mitjana</div>
        <div><span class="legend-dot dot-baixa"></span>Baixa</div>
      `;

      return div;
    };

    legend.addTo(map);

    async function searchLocation() {
      const query = document.getElementById("searchInput").value.trim();

      if (!query) {
        alert("Escriu una adreça o lloc.");
        return;
      }

      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", Barcelona")}&limit=1&countrycodes=es`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.length === 0) {
          alert("No s'ha trobat cap resultat.");
          return;
        }

        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);

        map.setView([lat, lon], 17);

        if (searchMarker) map.removeLayer(searchMarker);

        searchMarker = L.marker([lat, lon], { icon: searchIcon })
          .addTo(map)
          .bindPopup(`<strong>${data[0].display_name}</strong>`)
          .openPopup();

      } catch (error) {
        alert("Hi ha hagut un error fent la cerca.");
      }
    }

    function locateUser() {
      if (!navigator.geolocation) {
        alert("El teu navegador no permet geolocalització.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        position => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          map.setView([lat, lng], 16);

          if (userMarker) map.removeLayer(userMarker);

          userMarker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup("Estàs aquí")
            .openPopup();
        },
        () => {
          alert("No s'ha pogut obtenir la teva ubicació.");
        }
      );
    }

    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") searchLocation();
    });
  </script>
</body>
</html>
